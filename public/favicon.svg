<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#006847"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ce1126"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Steel coil (main icon element) - simplified cross-section -->
  <g transform="translate(256, 220)">
    <!-- Outer coil ring -->
    <ellipse cx="0" cy="0" rx="130" ry="130" fill="none" stroke="url(#steel)" stroke-width="42" opacity="0.95"/>
    <!-- Inner hole -->
    <ellipse cx="0" cy="0" rx="52" ry="52" fill="#0f172a"/>
    <!-- Shine highlight on coil -->
    <path d="M-90,-90 A130,130 0 0,1 90,-90" fill="none" stroke="#e2e8f0" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
  </g>
  <!-- Mexico tricolor bar at bottom -->
  <rect x="80" y="388" width="117" height="56" rx="8" fill="url(#green)"/>
  <rect x="197" y="388" width="118" height="56" rx="0" fill="#f8fafc"/>
  <rect x="315" y="388" width="117" height="56" rx="8" fill="url(#red)"/>
  <!-- Small upward arrow inside coil center (imports) -->
  <g transform="translate(256, 218)">
    <path d="M0,-24 L14,0 L7,0 L7,18 L-7,18 L-7,0 L-14,0 Z" fill="url(#accent)" opacity="0.95"/>
  </g>
</svg>